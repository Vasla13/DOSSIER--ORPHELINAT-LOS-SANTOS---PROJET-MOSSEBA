<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>DOSSIER MOSSEBA — Archives Sécurisées</title>
  <link rel="stylesheet" href="assets/css/style.css" />

  <script src="assets/vendor/d3.v7.min.js"></script>
</head>
<body>
  <div class="app-container">
    <header>
      <div class="topbar">
        <div class="brand">
          <div class="logo-icon">📂</div>
          <div class="brand-text">
            <strong>DOSSIER MOSSEBA</strong>
            <span>ARCHIVES SÉCURISÉES // NIVEAU OMEGA</span>
          </div>
        </div>

        <div class="header-actions">
          <nav class="nav" aria-label="Navigation">
            <button data-view="overview" aria-current="false" type="button">Synthèse</button>
            <button data-view="timeline" aria-current="page" type="button">Timeline</button>
            <button data-view="documents" aria-current="false" type="button">Preuves</button>
            <button data-view="people" aria-current="false" type="button">Sujets</button>
            <button data-view="graph" aria-current="false" type="button">Relations</button>
          </nav>

          <button
            class="mobile-filter-toggle"
            id="mobileFiltersToggle"
            type="button"
            aria-controls="sidebar"
            aria-expanded="false"
          >
            Filtres
          </button>
        </div>
      </div>
    </header>

    <main>
      <aside class="panel sidebar" id="sidebar"></aside>

      <section class="panel content-area" id="content">
      </section>
    </main>
  </div>

  <div class="mobile-sidebar-backdrop" id="mobileSidebarBackdrop"></div>

  <div class="modal-backdrop" id="modalBackdrop" role="dialog" aria-modal="true">
    <div class="modal" id="modal">
      <header>
        <div class="mbar">
          <h3>DÉTAILS DU FICHIER</h3>
          <button class="close" type="button">✕</button>
        </div>
      </header>
      <div class="body"></div>
    </div>
  </div>

  <script src="data/timeline.js"></script>
  
  <script type="module" src="assets/js/app.js"></script>
</body>
</html>
